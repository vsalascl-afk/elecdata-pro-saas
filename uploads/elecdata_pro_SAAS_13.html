async function supaFetch(tabla, metodo='GET', body=null, filtro=''){
  const token = localStorage.getItem('token');

  const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}${filtro}`,{
    method: metodo,
    headers:{
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY),
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: body ? JSON.stringify(body) : null
  });

  return res.ok ? res.json() : null;
}

async function login(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('pin').value.trim();

  if (!email || !password) {
    return showError('Completa los datos');
  }

  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!data.access_token) {
    return showError('Credenciales incorrectas');
  }

  localStorage.setItem('token', data.access_token);

  const userData = await supaFetch('usuarios','GET',null,`?auth_id=eq.${data.user.id}`);
  user = userData?.[0];
// MUESTRA USUARIO Y AVATAR
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('userName').textContent = user?.nombre || 'Usuario';
  document.getElementById('userAvatar').textContent = getIniciales(user?.nombre);

  if(user?.rol === 'admin'){
    document.getElementById('adminPanel').classList.remove('hidden');
  }

  cargarOT();
}

function getIniciales(nombre){
  if(!nombre) return '--';

  const partes = nombre.split(' ');
  return partes.map(p => p[0]).join('').toUpperCase().slice(0,2);
}

async function cargarOT(){

let chart;

function renderGrafico(lista){
  if(!lista) return;

  const pendientes = lista.filter(o=>o.estado==='pendiente').length;
  const enCurso = lista.filter(o=>o.estado==='en_curso').length;
  const completadas = lista.filter(o=>o.estado==='completada').length;

  const ctx = document.getElementById('graficoOT');

  if(chart){
    chart.destroy();
  }

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Pendientes','En Curso','Completadas'],
      datasets: [{
        data: [pendientes, enCurso, completadas],
        backgroundColor: [
          '#f59e0b',
          '#0ea5e9',
          '#22c55e'
        ]
      }]
    },
    options: {
      plugins: {
        legend: {
          position: 'bottom'
        }
      }
    }
  });
}

async function guardarFirma(otId){
  if(!signaturePads[otId] || signaturePads[otId].isEmpty()){
    alert('Debe firmar');
    return;
  }

  try{
    const dataURL = signaturePads[otId].toDataURL();
    const blob = await (await fetch(dataURL)).blob();
    const fileName = `firma_${otId}.png`;

    const { error } = await supabaseClient.storage
      .from('firmas_ot')
      .upload(fileName, blob, { upsert: true });

    if(error){
      console.error(error);
      alert('Error subiendo firma');
      return;
    }

    const { data } = supabaseClient.storage
      .from('firmas_ot')
      .getPublicUrl(fileName);

    const url = data.publicUrl;

    await supabaseClient
      .from('ordenes_trabajo')
      .update({ firma_cliente_url: url })
      .eq('id', otId);

    alert('Firma guardada');
    cargarOT();

  }catch(err){
    console.error(err);
    alert('Error firma');
  }
}

  try {

    const fileName = `firma_${otId}.png`;

      .from('firmas_ot')
      .upload(fileName, blob, { upsert: true });

    if(uploadError){
      console.error(uploadError);
      alert('Error subiendo firma');
      return;
    }

    const { data } = supabaseClient.storage
      .from('firmas_ot')
      .getPublicUrl(fileName);

    const publicUrl = data.publicUrl;

    // guardar en DB
    const { error: dbError } = await supabaseClient
      .from('ordenes_trabajo')
      .update({ firma_cliente_url: publicUrl })
      .eq('id', otId);

    if(dbError){
      console.error(dbError);
      alert('Error guardando en BD');
      return;
    }

    // actualizar UI
    const div = document.getElementById(`firma-${otId}`).parentNode;
    div.innerHTML = `<img src="${publicUrl}" style="width:250px;height:80px;object-fit:contain;border:1px solid #ccc;border-radius:4px;">`;

    alert('Firma guardada');
  } catch(err){
    console.error(err);
    alert('Error firma');

async function subirFoto(file){

  const fileName = `ot_${Date.now()}.jpg`;

  const res = await fetch(`https://wdkgogppdrjnwcviflrn.supabase.co/storage/v1/object/fotos_ot/${fileName}`, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + localStorage.getItem('token'),
      'Content-Type': file.type
    },
    body: file
  });

  if(!res.ok){
    const error = await res.text();
    console.error("ERROR REAL:", error); // 👈 CLAVE
    return null;
  }

  return fileName;
}
